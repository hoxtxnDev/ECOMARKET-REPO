spring.application.name=soporteservice

server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3306/soporte_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# URLs de otros microservicios (modo XAMPP / desarrollo local)
# usuario-service expone clientes en puerto 8085
microservicio.usuarios.url=http://localhost:8085
# carritocompraservice expone pedidos en puerto 8082
microservicio.pedidos.url=http://localhost:8082
# analiticaservice expone metricas en puerto 8084
microservicio.analitica.url=http://localhost:8084
