spring.application.name=proceso-pago-service
server.port=8083

# URLs de otros microservicios (se configuran cuando se integren)
app.services.carrito-compra-url=http://localhost:8082
app.services.registro-usuarios-url=http://localhost:8081
app.services.logistica-envios-url=http://localhost:8085

# DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/proceso_pago_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
